version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: HEAD~1

formatters:
  enable:
    - gofmt

run:
  timeout: 5m

